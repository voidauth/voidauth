<div class="container">
  <div class="multi-select-actions">
    @if (this.selectEnabled) {
      <button mat-button [disabled]="!selected.length || currentUserSelected()" (click)="deleteSelected()">
        {{ "admin.common.actions.delete" | translate }}
        <mat-icon fontSet="material-icons-round">delete_forever</mat-icon>
      </button>
      <button mat-flat-button [disabled]="!selected.length" (click)="approveSelected()">
        {{ "admin.users.actions.approve" | translate }}
        <mat-icon fontSet="material-icons-round">check</mat-icon>
      </button>
      <button mat-icon-button (click)="toggleSelectEnabled()">
        <mat-icon fontSet="material-icons-round">cancel</mat-icon>
      </button>
    } @else {
      <button mat-flat-button (click)="toggleSelectEnabled()">
        {{ "admin.users.actions.select" | translate }}
        <mat-icon fontSet="material-icons-round">check</mat-icon>
      </button>
    }
  </div>

  <mat-form-field>
    <mat-label>{{ "admin.users.labels.search" | translate }}</mat-label>
    <input matInput type="text" [formControl]="search" />
    <button class="field-suffix" mat-icon-button matSuffix (click)="search.setValue('')">
      <mat-icon fontSet="material-icons-round">cancel</mat-icon>
    </button>
  </mat-form-field>

  <table mat-table [dataSource]="dataSource" matSort>
    <ng-container matColumnDef="multi">
      <th mat-header-cell *matHeaderCellDef></th>
      <td mat-cell *matCellDef="let row" class="multi">
        <mat-checkbox (change)="select(row.id, $event)"></mat-checkbox>
      </td>
    </ng-container>

    @for (column of columns; track column) {
      <ng-container [matColumnDef]="column.columnDef">
        <th mat-header-cell *matHeaderCellDef mat-sort-header>
          {{ column.header }}
        </th>
        <td mat-cell *matCellDef="let row">
          @if (column.isIcon) {
            <mat-icon fontSet="material-icons-round">{{ column.cell(row) }}</mat-icon>
          } @else {
            {{ column.cell(row) }}
          }
        </td>
      </ng-container>
    }

    <ng-container matColumnDef="actions">
      <th mat-header-cell *matHeaderCellDef></th>
      <td mat-cell *matCellDef="let row" class="actions">
        <a mat-icon-button [routerLink]="['/admin', 'user', row.id]" [matTooltip]="'admin.common.actions.edit' | translate">
          <mat-icon fontSet="material-icons-round">edit</mat-icon>
        </a>
        <button
          mat-icon-button
          type="button"
          [disabled]="row.id === me?.id"
          (click)="delete(row.id)"
          [matTooltip]="'admin.common.actions.delete' | translate"
        >
          <mat-icon fontSet="material-icons-round">delete_forever</mat-icon>
        </button>
      </td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>

    <!-- Row shown when there is no matching data. -->
    <tr *matNoDataRow>
      <td style="height: 40px; text-align: center; font-weight: bold" [attr.colspan]="columns.length + 1">
        <h1>{{ "admin.users.empty-state" | translate }}</h1>
      </td>
    </tr>
  </table>

  <div style="flex-grow: 1"></div>

  <mat-paginator [pageSizeOptions]="[5, 10, 25, 100]" [pageSize]="10"></mat-paginator>
</div>
