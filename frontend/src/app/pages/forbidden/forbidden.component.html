<h1>{{ "forbidden.title" | translate }}</h1>
<mat-card class="form-card">
  <mat-card-content>
    <p style="text-align: center">{{ "forbidden.content" | translate }}</p>

    @if (history.length) {
      <mat-card-actions>
        <button mat-button type="button" (click)="history.back()">{{ "forbidden.actions.back" | translate }}</button>
      </mat-card-actions>
    }
  </mat-card-content>
</mat-card>

<span style="flex-grow: 1"></span>

@if (config?.contactEmail; as contactEmail) {
  <a style="margin-top: 48px" mat-button [href]="'mailto:' + contactEmail">{{ "contact-us.actions.label" | translate }}</a>
}
