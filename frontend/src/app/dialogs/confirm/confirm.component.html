@if (data.header) {
  <h2 mat-dialog-title>{{ data.header }}</h2>
}
<mat-dialog-content>
  {{ data.message }}
  @if (data.requiredText) {
    <div></div>
    <p [innerHTML]="'components.confirm.instructions' | translate: { requiredText: data.requiredText }"></p>
    <mat-form-field style="width: 100%">
      <input matInput type="text" [formControl]="requiredTextControl" />
    </mat-form-field>
  }
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button mat-button mat-dialog-close>{{ "components.confirm.actions.cancel.label" | translate }}</button>
  <button
    mat-flat-button
    [mat-dialog-close]="true"
    cdkFocusInitial
    [disabled]="data.requiredText && data.requiredText !== requiredTextControl.value"
  >
    {{ "components.confirm.actions.confirm.label" | translate }}
  </button>
</mat-dialog-actions>
