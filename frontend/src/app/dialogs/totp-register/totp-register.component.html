<h1 matDialogTitle>{{ "components.totp-register.title" | translate }}</h1>
<app-totp-input
  [enableMfa]="$safeNavigationMigration(data?.enableMfa)"
  [uri]="uri()"
  [secret]="secret()"
  [disabled]="disabled()"
  (codeFinished)="verifyToken($event)"
></app-totp-input>
<button style="margin-top: 12px; margin-bottom: 16px" mat-button mat-dialog-close>
  {{ "components.totp-register.actions.cancel.label" | translate }}
</button>
